# Сборка и публикация MkDocs на GitHub Pages
# Сайт: https://<owner>.github.io/airflow-docs/
# Для сайта на airflow-docs.github.io используйте репозиторий airflow-docs.github.io в организации airflow-docs

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs and Material theme
        run: |
          pip install mkdocs==1.6.0
          pip install mkdocs-material>=9.5.0
          pip install mkdocs-glightbox

      - name: Set site_url for project page
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          SITE_URL="https://${OWNER}.github.io/${REPO}/"
          sed -i "s|^site_url:.*|site_url: $SITE_URL|" mkdocs.yml

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
