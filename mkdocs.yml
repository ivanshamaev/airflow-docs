# MkDocs + Material — конфигурация сайта документации Airflow (рус.)
# Деплой: GitHub Actions публикует сайт на GitHub Pages

site_name: Airflow Docs (RU)
site_description: Русский перевод документации Apache Airflow и Astronomer Learn
site_author: airflow-docs
site_url: https://ivanshamaev.github.io/airflow-docs/

# Исходные документы (симлинки на корневые папки)
docs_dir: docs

# Тема Material: боковое меню, поиск, тёмная тема
theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

# Репозиторий для ссылки «Edit» (замените на свой)
repo_url: https://github.com/ivanshamaev/airflow-docs
edit_uri: edit/main/
repo_name: ivanshamaev/airflow-docs

plugins:
  - search
  - glightbox

